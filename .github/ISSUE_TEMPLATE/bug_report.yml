name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below so we can reproduce and triage it quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen instead.
      placeholder: When I ..., the ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Click `...`
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Version of the software where you saw this.
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system and relevant environment details.
      placeholder: macOS 15.2, Chrome 130
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server output or console errors. This is automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I have not pasted private content; logs and screenshots are scrubbed of sensitive data.
          required: true
